<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Списък</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>To-Do Списък</h1>

    <div class="input-row">
      <input id="todo-input" type="text" placeholder="Нова задача..." autocomplete="off" />
      <button id="add-btn">Добави</button>
    </div>
    <p id="error" class="error" aria-live="polite"></p>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">Всички</button>
      <button class="filter-btn" data-filter="active">Активни</button>
      <button class="filter-btn" data-filter="completed">Завършени</button>
    </div>

    <ul id="todo-list"></ul>

    <p id="counter" class="counter"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
