<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>

    <header>
        <div class="container">
            <h1>💶 Finance Tracker</h1>
            <div class="header-right">
                <span id="last-visit"></span>
                <button id="theme-toggle">🌓</button>
            </div>
        </div>
    </header>

    <main id="main">
        <aside class="stats" aria-label="Statistics">
            <div class="card">
                <h3>Balance</h3>
                <p id="total-balance" aria-live="polite">0.00 EUR</p>
            </div>
            <div class="card">
                <h3 class="income-label">Income</h3>
                <p id="total-income">0.00 EUR</p>
            </div>
            <div class="card">
                <h3 class="expense-label">Expenses</h3>
                <p id="total-expense">0.00 EUR</p>
            </div>
        </aside>

        <div class="grid">
            <section class="card">
                <h2>New Entry</h2>
                <form id="finance-form">
                    <div class="field">
                        <label for="desc">Description</label>
                        <input type="text" id="desc" required>
                    </div>
                    <div class="field">
                        <label for="amount">Amount (EUR)</label>
                        <input type="number" id="amount" step="0.01" required>
                    </div>
                    <div class="field">
                        <label for="type">Type</label>
                        <select id="type">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="category">Category</label>
                        <select id="category"></select>
                    </div>
                    <div class="field">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <button type="submit" class="btn-main">Add</button>
                </form>
            </section>

            <section class="card">
                <h2>Filters</h2>
                <div class="filters">
                    <div class="field">
                        <label for="f-period">Period</label>
                        <select id="f-period">
                            <option value="all">All</option>
                            <option value="day">Today</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="f-cat">Category</label>
                        <select id="f-cat">
                            <option value="all">All Categories</option>
                        </select>
                    </div>
                </div>
                <canvas id="chart" width="300" height="150"></canvas>
            </section>
        </div>

        <section id="history">
            <h2>History</h2>
            <div id="list"></div>
        </section>

        <footer>
            <button id="export">Export JSON</button>
            <label for="import" class="btn-alt">Import JSON</label>
            <input type="file" id="import" hidden>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
